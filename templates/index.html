<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brain Tumor Detector</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
            width: 400px;
        }
        h2 { color: #333; }
        p { color: #666; font-size: 14px; margin-bottom: 20px;}
        input[type="file"] {
            margin-bottom: 20px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            width: 90%;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
        }
        button:hover { background-color: #0056b3; }
        .result {
            margin-top: 25px;
            font-size: 18px;
            font-weight: bold;
            padding: 15px;
            border-radius: 5px;
            background-color: #f8f9fa;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Brain Tumor AI Classifier</h2>
    <p>Upload an MRI scan to test the custom-built mathematical model.</p>
    
    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="file" accept="image/*" required>
        <button type="submit">Analyze Scan</button>
    </form>

    {% if prediction %}
    <div class="result" style="color: {{ color }}; border: 1px solid {{ color }};">
        
        {% if image_url %}
            <img src="{{ image_url }}" alt="Uploaded MRI Scan" style="max-width: 250px; border-radius: 8px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
            <br>
        {% endif %}
        
        {{ prediction }}
    </div>
    {% endif %}
</div>

</body>
</html>
